name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: clubhub_test
          POSTGRES_USER: clubhub_user
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x

      - name: Restore dependencies
        run: dotnet restore backend/ClubHub.sln

      - name: Build
        run: dotnet build backend/ClubHub.sln --no-restore --configuration Release

      - name: Run tests
        run: dotnet test backend/ClubHub.sln --no-build --configuration Release --verbosity normal
        env:
          ConnectionStrings__Default: "Host=localhost;Port=5432;Database=clubhub_test;Username=clubhub_user;Password=testpassword"

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x

      - name: Restore dependencies
        run: dotnet restore backend/ClubHub.sln

      - name: Check formatting
        run: dotnet format backend/ClubHub.sln --verify-no-changes --severity warn

      - name: Install dotnet-outdated
        run: dotnet tool install --global dotnet-outdated-tool

      - name: Check for outdated packages
        run: dotnet outdated backend/ClubHub.sln
        continue-on-error: true

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Check formatting
        run: npm run format:check
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Type check
        run: npm run check
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend